[supervisord]
nodaemon=true
logfile=/dev/null
pidfile=/tmp/supervisord.pid

[program:nginx]
directory=/app
command=/usr/sbin/nginx -g "daemon off;" -c /app/nginx.conf
autorestart=true
startsecs=3
priority=30
stopsignal=TERM
stopasgroup=true
killasgroup=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:web]
directory=/app
command=/usr/bin/env PORT=3000 HOSTNAME=0.0.0.0 SERVICE_NAME=autocashback-web npm run service:web
autorestart=true
startsecs=8
priority=10
stopsignal=TERM
stopasgroup=true
killasgroup=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:scheduler]
directory=/app
command=/usr/bin/env SERVICE_NAME=autocashback-scheduler npm run service:scheduler
autorestart=true
startsecs=5
priority=20
stopsignal=TERM
stopasgroup=true
killasgroup=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
