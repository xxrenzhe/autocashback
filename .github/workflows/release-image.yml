name: Build and Release AutoCashBack Image

on:
  push:
    branches: [main]
    tags:
      - "v*.*.*"
    paths-ignore:
      - "docs/**"
      - "oldcode/**"
      - "secrets/**"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  GHCR_REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          clean: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type Check
        run: npm run type-check

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  publish:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          clean: true

      - name: Free disk space before image build
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL /usr/local/.ghcup || true
          sudo apt-get clean || true
          docker system prune -af --volumes || true

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare tags
        id: tags
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          IMAGE=${{ env.GHCR_REGISTRY }}/${{ env.IMAGE_NAME }}
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
            echo "tags=${IMAGE}:prod-${VERSION},${IMAGE}:prod-${SHORT_SHA}" >> $GITHUB_OUTPUT
          else
            echo "tags=${IMAGE}:prod-latest,${IMAGE}:prod-${SHORT_SHA}" >> $GITHUB_OUTPUT
          fi

      - name: Build and Push
        uses: docker/build-push-action@v6
        env:
          DOCKER_BUILD_SUMMARY: false
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=autocashback-release
          cache-to: type=gha,mode=max,scope=autocashback-release
          provenance: false
          sbom: false

      - name: Cleanup Docker artifacts
        if: always()
        run: |
          docker builder prune -af || true
          docker system prune -af --volumes || true
