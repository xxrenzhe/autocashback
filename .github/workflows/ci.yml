name: AutoCashBack CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "oldcode/**"
      - "secrets/**"
  workflow_dispatch:

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Actionlint
        run: docker run --rm -v "$PWD:/repo" -w /repo rhysd/actionlint:latest

  build:
    needs: actionlint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Type Check
        run: npm run type-check

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Docker Smoke
        run: docker build -t autocashback-ci .
